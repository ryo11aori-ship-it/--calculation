name: Calculate_Pi_1000w
on:
  push:
  workflow_dispatch:

jobs:
  run-pi:
    runs-on: ubuntu-latest
    steps:
      - name: Install_Dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgmp-dev

      - name: Create_Code
        run: |
          cat << 'EOF' > main.cpp
          #include <array>
          #include <chrono>
          #include <climits>
          #include <cmath>
          #include <cstdio>
          #include <gmpxx.h>
          #include <iostream>
          #include <optional>
          #include <utility>

          using namespace std;

          static constexpr unsigned long LIMIT_SEC = 55;
          static constexpr unsigned long CHUNK = 64;
          static constexpr unsigned long LEAF = 16;

          static constexpr long A = 13591409;
          static constexpr long B = 545140134;
          static constexpr unsigned long C3_OVER_24 = 10939058860032000UL;
          static constexpr long double DIGITS_PER_TERM = 14.181647462725477L;

          struct BS {
              mpz_class P;
              mpz_class Q;
              mpz_class T;
          };

          static inline BS combine(const BS& left, const BS& right) {
              BS out;
              mpz_mul(out.P.get_mpz_t(), left.P.get_mpz_t(), right.P.get_mpz_t());
              mpz_mul(out.Q.get_mpz_t(), left.Q.get_mpz_t(), right.Q.get_mpz_t());

              mpz_mul(out.T.get_mpz_t(), left.T.get_mpz_t(), right.Q.get_mpz_t());
              mpz_addmul(out.T.get_mpz_t(), right.T.get_mpz_t(), left.P.get_mpz_t());
              return out;
          }

          static inline BS term_at(unsigned long k) {
              if (k == 0) {
                  return BS{1, 1, A};
              }

              mpz_class kk = k;
              mpz_class p = (6 * kk - 5) * (2 * kk - 1) * (6 * kk - 1);
              mpz_class q = kk * kk * kk * C3_OVER_24;
              mpz_class t = p * (A + B * kk);
              if (k & 1UL) t = -t;
              return BS{std::move(p), std::move(q), std::move(t)};
          }

          static BS bs(unsigned long a, unsigned long b) {
              if (b - a == 1) {
                  return term_at(a);
              }

              if (b - a <= LEAF) {
                  BS r = term_at(a);
                  for (unsigned long k = a + 1; k < b; ++k) {
                      r = combine(r, term_at(k));
                  }
                  return r;
              }

              unsigned long m = (a + b) >> 1;
              BS left = bs(a, m);
              BS right = bs(m, b);
              return combine(left, right);
          }

          int main() {
              auto start = chrono::steady_clock::now();

              // 最初の 1 項だけは別に保持し、以降を平衡スタックでまとめる
              BS head = term_at(0);
              unsigned long terms = 1;

              array<optional<BS>, 64> bins;
              size_t max_level = 0;

              auto push_part = [&](BS part) {
                  size_t level = 0;
                  while (true) {
                      if (level >= bins.size()) {
                          bins[bins.size() - 1] = std::move(part);
                          if (bins.size() - 1 > max_level) max_level = bins.size() - 1;
                          return;
                      }
                      if (!bins[level].has_value()) {
                          bins[level].emplace(std::move(part));
                          if (level > max_level) max_level = level;
                          return;
                      }
                      part = combine(*bins[level], part);
                      bins[level].reset();
                      ++level;
                  }
              };

              while (true) {
                  auto now = chrono::steady_clock::now();
                  if (chrono::duration_cast<chrono::seconds>(now - start).count() >= LIMIT_SEC) {
                      break;
                  }

                  unsigned long next = terms + CHUNK;
                  BS part = bs(terms, next);
                  push_part(std::move(part));
                  terms = next;
              }

              BS tail;
              bool have_tail = false;

              for (int i = static_cast<int>(max_level); i >= 0; --i) {
                  if (!bins[i].has_value()) continue;
                  if (!have_tail) {
                      tail = std::move(*bins[i]);
                      have_tail = true;
                  } else {
                      tail = combine(tail, *bins[i]);
                  }
              }

              BS total = have_tail ? combine(head, tail) : head;

              long double estimated_digits = static_cast<long double>(terms) * DIGITS_PER_TERM;
              unsigned long digits = estimated_digits > 16.0L
                  ? static_cast<unsigned long>(estimated_digits) - 4UL
                  : static_cast<unsigned long>(estimated_digits);

              mp_bitcnt_t bits = static_cast<mp_bitcnt_t>(digits * 3.3219280948873626L + 32768.0L);
              mpf_set_default_prec(bits);

              mpf_class sqrt10005(10005);
              sqrt10005 = sqrt(sqrt10005);
              mpf_class C = sqrt10005 * 426880;
              mpf_class pi = (C * total.Q) / total.T;

              FILE* fp = fopen("pi.txt", "w");
              if (!fp) return 1;
              setvbuf(fp, nullptr, _IOFBF, 1 << 20);

              int out_digits = (digits > static_cast<unsigned long>(INT_MAX - 1))
                  ? (INT_MAX - 1)
                  : static_cast<int>(digits);

              gmp_fprintf(fp, "%.*Ff\n", out_digits, pi.get_mpf_t());
              fclose(fp);

              cout << out_digits << "桁" << endl;
              return 0;
          }
          EOF

      - name: Compile
        run: g++ -O3 -march=native -flto -pipe -DNDEBUG -std=c++17 main.cpp -lgmpxx -lgmp -o pi

      - name: Run
        run: ./pi

      - name: Upload_Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi_result
          path: pi.txt