name: Calculate_Pi_1000w
on:
  push:
  workflow_dispatch:

jobs:
  run-pi:
    runs-on: ubuntu-latest
    steps:
      - name: Install_Dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libgmp-dev

      - name: Create_Code
        run: |
          cat << 'EOF' > main.cpp
          #include <array>
          #include <algorithm>
          #include <chrono>
          #include <climits>
          #include <cmath>
          #include <cstdio>
          #include <future>
          #include <gmpxx.h>
          #include <iostream>
          #include <optional>
          #include <thread>
          #include <utility>
          #include <vector>

          using namespace std;

          static constexpr unsigned long LIMIT_SEC = 55;
          static constexpr unsigned long CHUNK = 512;
          static constexpr unsigned long LEAF = 32;
          static constexpr unsigned long BLOCKS_PER_TASK = 4;

          static constexpr long A = 13591409;
          static constexpr long B = 545140134;
          static constexpr unsigned long C3_OVER_24 = 10939058860032000UL;
          static constexpr long double DIGITS_PER_TERM = 14.181647462725477L;
          static constexpr long double LOG2_10 = 3.32192809488736234787L;

          struct BS {
              mpz_class P;
              mpz_class Q;
              mpz_class T;
          };

          static inline BS combine(const BS& left, const BS& right) {
              BS out;
              mpz_mul(out.P.get_mpz_t(), left.P.get_mpz_t(), right.P.get_mpz_t());
              mpz_mul(out.Q.get_mpz_t(), left.Q.get_mpz_t(), right.Q.get_mpz_t());

              mpz_mul(out.T.get_mpz_t(), left.T.get_mpz_t(), right.Q.get_mpz_t());
              mpz_addmul(out.T.get_mpz_t(), right.T.get_mpz_t(), left.P.get_mpz_t());
              return out;
          }

          static inline BS term_at(unsigned long k) {
              if (k == 0) {
                  return BS{1, 1, A};
              }

              mpz_class p = 6UL * k - 5;
              p *= (2UL * k - 1);
              p *= (6UL * k - 1);

              mpz_class q = k;
              q *= k;
              q *= k;
              q *= C3_OVER_24;

              mpz_class t = p;
              t *= (A + B * static_cast<long>(k));
              if (k & 1UL) t = -t;

              return BS{std::move(p), std::move(q), std::move(t)};
          }

          static BS bs(unsigned long a, unsigned long b) {
              if (b - a == 1) {
                  return term_at(a);
              }

              if (b - a <= LEAF) {
                  BS r = term_at(a);
                  for (unsigned long k = a + 1; k < b; ++k) {
                      r = combine(r, term_at(k));
                  }
                  return r;
              }

              unsigned long m = a + ((b - a) >> 1);
              BS left = bs(a, m);
              BS right = bs(m, b);
              return combine(left, right);
          }

          static BS compute_range(unsigned long a, unsigned long b) {
              BS acc = bs(a, min(a + CHUNK, b));
              for (unsigned long s = a + CHUNK; s < b; s += CHUNK) {
                  unsigned long e = min(s + CHUNK, b);
                  acc = combine(acc, bs(s, e));
              }
              return acc;
          }

          int main() {
              auto start = chrono::steady_clock::now();

              BS head = term_at(0);
              unsigned long terms = 1;

              array<optional<BS>, 64> bins;
              size_t max_level = 0;

              auto push_part = [&](BS part) {
                  size_t level = 0;
                  while (true) {
                      if (level >= bins.size()) {
                          bins[bins.size() - 1] = std::move(part);
                          max_level = max(max_level, bins.size() - 1);
                          return;
                      }
                      if (!bins[level].has_value()) {
                          bins[level].emplace(std::move(part));
                          max_level = max(max_level, level);
                          return;
                      }
                      part = combine(*bins[level], part);
                      bins[level].reset();
                      ++level;
                  }
              };

              unsigned hw = thread::hardware_concurrency();
              if (hw == 0) hw = 1;
              hw = min(hw, 4u);

              while (true) {
                  auto now = chrono::steady_clock::now();
                  if (chrono::duration_cast<chrono::seconds>(now - start).count() >= LIMIT_SEC) {
                      break;
                  }

                  vector<future<BS>> futs;
                  futs.reserve(hw);

                  unsigned long batch_start = terms;
                  unsigned long task_span = CHUNK * BLOCKS_PER_TASK;

                  for (unsigned t = 0; t < hw; ++t) {
                      unsigned long a = batch_start + static_cast<unsigned long>(t) * task_span;
                      unsigned long b = a + task_span;
                      futs.emplace_back(async(launch::async, [a, b]() {
                          return compute_range(a, b);
                      }));
                  }

                  terms = batch_start + static_cast<unsigned long>(hw) * task_span;

                  for (auto& f : futs) {
                      push_part(f.get());
                  }
              }

              BS tail;
              bool have_tail = false;

              for (int i = static_cast<int>(max_level); i >= 0; --i) {
                  if (!bins[i].has_value()) continue;
                  if (!have_tail) {
                      tail = std::move(*bins[i]);
                      have_tail = true;
                  } else {
                      tail = combine(tail, *bins[i]);
                  }
              }

              BS total = have_tail ? combine(head, tail) : head;

              long double estimated_digits = static_cast<long double>(terms) * DIGITS_PER_TERM;
              unsigned long digits = estimated_digits > 16.0L
                  ? static_cast<unsigned long>(estimated_digits) - 4UL
                  : static_cast<unsigned long>(estimated_digits);

              mp_bitcnt_t bits = static_cast<mp_bitcnt_t>((static_cast<long double>(digits) + 256.0L) * LOG2_10);
              mpf_set_default_prec(bits);

              mpf_class sqrt10005(10005);
              sqrt10005 = sqrt(sqrt10005);
              mpf_class C = sqrt10005 * 426880;
              mpf_class pi = (C * total.Q) / total.T;

              FILE* fp = fopen("pi.txt", "w");
              if (!fp) return 1;
              setvbuf(fp, nullptr, _IOFBF, 1 << 20);

              int out_digits = (digits > static_cast<unsigned long>(INT_MAX - 1))
                  ? (INT_MAX - 1)
                  : static_cast<int>(digits);

              gmp_fprintf(fp, "%.*Ff\n", out_digits, pi.get_mpf_t());
              fclose(fp);

              cout << out_digits << "桁" << endl;
              return 0;
          }
          EOF

      - name: Compile
        run: g++ -O3 -march=native -flto -pipe -funroll-loops -fomit-frame-pointer -DNDEBUG -std=c++17 -pthread main.cpp -lgmpxx -lgmp -o pi

      - name: Run
        run: ./pi

      - name: Upload_Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pi_result
          path: pi.txt